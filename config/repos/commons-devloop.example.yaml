version: 2

repo:
  key: commons-devloop
  github_slug: Open-Labor-Foundation/commons-devloop
  default_branch: main

lifecycle:
  enabled: true
  target_mode: open
  target_name: local-service-default-backlog
  pause_when_target_complete: true
  pause_when_budget_exhausted: true
  max_parallel_prs: 1
  max_runs_per_day: 24

issue_source:
  labels:
    - codex-ready

dispatcher:
  poll_interval_seconds: 10
  primary_max_workers: 1
  secondary_max_workers: 0
  skip_issue_numbers:
    - 1

models:
  dispatcher:
    primary:
      name: gpt-5.4
      reasoning_effort: high
      pause_threshold_used_percent: 80
      weekly_pause_threshold_used_percent: 80
      reserve_burn_window_minutes: 300
      nominal_burn_per_lane_hour: 3
    secondary:
      name: gpt-5.4
      reasoning_effort: medium
      pause_threshold_used_percent: 80
      weekly_pause_threshold_used_percent: 80
      reserve_burn_window_minutes: 300
      nominal_burn_per_lane_hour: 3
  reviewer:
    name: gpt-5.4
    reasoning_effort: medium

validation:
  context: validate
  poll_interval_seconds: 30
  max_concurrent: 1
  bootstrap_commands:
    - npm ci
  commands:
    - AE_REPO_CONFIG=/engine/config/repos/commons-devloop.yaml npm run validate:config
    - node --check scripts/engine-role.mjs
    - node --check scripts/dashboard-server.mjs
  post_status: false

reviewer:
  poll_interval_seconds: 60
  max_concurrent: 1
  post_mode: review

runner_manager:
  required_labels:
    - self-hosted
    - linux
    - commons-devloop
  runner_labels:
    - self-hosted
    - linux
    - commons-devloop
  image_name: commons-devloop/gh-runner:latest
  container_prefix: commons-devloop-gh-runner
  max_runners: 2
  poll_interval_seconds: 20
  launch_cooldown_seconds: 180
  mount_docker_socket: true
  mount_workspace: false
  dry_run: true

pr_manager:
  interval_seconds: 20
  merge_concurrency: 2
  auto_close_superseded_conflicts: false

monitor:
  poll_interval_seconds: 20

safety:
  pr_only: true
  auto_merge: true
  protected_branches:
    - main
  protected_paths: []
  allow_force_push: false
  require_clean_worktree_before_run: true

budgets:
  max_estimated_credits_per_day: 100
  pause_reason_on_budget: daily credit budget reached

branches:
  work_branch_prefix: autonomous/
  pr_base_branch: main

dashboard:
  port: 4700
  expose_issue_details: true
  expose_pr_links: true
